name: sync-upstream

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync all upstream branches and tags (preserve fork workflows)
        env:
          UPSTREAM_REPOSITORY: aria2/aria2
        run: |
          set -euo pipefail

          upstream_url="https://github.com/${UPSTREAM_REPOSITORY}.git"
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "${upstream_url}"
          else
            git remote add upstream "${upstream_url}"
          fi

          default_branch="$(git ls-remote --symref "${upstream_url}" HEAD | awk '/^ref:/ {sub("refs/heads/","",$2); print $2}')"
          if [[ -z "${default_branch}" ]]; then
            echo "Failed to detect upstream default branch."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch all upstream branches/tags and current fork branches.
          git fetch upstream --prune --tags "+refs/heads/*:refs/remotes/upstream/*"
          git fetch origin --prune "+refs/heads/*:refs/remotes/origin/*"

          # Sync every upstream branch while preserving fork workflow files.
          while IFS= read -r up_ref; do
            branch="${up_ref#refs/remotes/upstream/}"
            echo "Syncing branch: ${branch}"

            git checkout --detach "${up_ref}"

            # Keep fork workflow state for existing branch; otherwise omit workflows.
            if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
              if git cat-file -e "refs/remotes/origin/${branch}:.github/workflows" 2>/dev/null; then
                git checkout "refs/remotes/origin/${branch}" -- .github/workflows
              else
                rm -rf .github/workflows
              fi
            else
              rm -rf .github/workflows
            fi

            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore(sync): upstream ${branch} (preserve fork workflows)"
            fi

            git push origin "HEAD:refs/heads/${branch}" --force
          done < <(git for-each-ref --format='%(refname)' refs/remotes/upstream | grep -v '^refs/remotes/upstream/HEAD$')

          # Tags are mirrored from upstream.
          git push origin --tags

          echo "Synced all branches and tags from ${UPSTREAM_REPOSITORY} while preserving fork workflows."
